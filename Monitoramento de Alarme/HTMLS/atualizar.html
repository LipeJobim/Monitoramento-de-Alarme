<!DOCTYPE html>
<html>
<head>
    <title>Atualizar Alarme</title>
    <!-- Inclua os estilos do Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h2>Atualizar Alarme</h2>
        <form action="http://localhost:8080/alarme/atualizar" method="post">
            <div class="mb-3">
                <label for="idAlarme" class="form-label">ID do Alarme:</label>
                <input type="number" class="form-control" id="idAlarme" name="idAlarme" required>
            </div>
            <div class="mb-3">
                <label for="Locala" class="form-label">Localização:</label>
                <input type="text" class="form-control" id="Locala" name="Locala" required>
            </div>
            <div class="mb-3">
                <label for="date" class="form-label">Data:</label>
                <input type="date" class="form-control" id="date" name="date" required>
            </div>
            <div class="mb-3">
                <label for="Ativo" class="form-label">Ativo:</label>
                <select class="form-select" id="Ativo" name="Ativo" required>
                    <option value=""></option>
                    <option value="true">Sim</option>
                    <option value="false">Não</option>
                </select>
            </div>
            <!-- Inclua um campo oculto para o ID do cliente associado ao alarme (se necessário) -->
            <input type="hidden" name="idCliente" value="123">
            <button type="submit" class="btn btn-primary">Atualizar Alarme</button>
        </form>
    </div>
    <!-- Inclua os scripts do Bootstrap e do jQuery (caso necessário) -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
