<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Registros</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Adicione o seu estilo CSS se necessário -->
</head>
<style>
    body {
        background-color: #f8f9fa; /* Cor de fundo */
    }

    .container {
        margin-top: 50px; /* Espaço superior */
    }

    .table-container {
        margin-top: 20px; /* Espaço entre o botão e a tabela */
    }

    h1 {
        text-align: center; /* Centraliza o título */
    }

    button {
        margin-bottom: 20px; /* Espaço abaixo do botão */
    }

    </style>
<body>
    <h1>Lista de Registros</h1>

    <p id="resultado_label"></p>

    <button class="btn btn-primary" onclick="listarRegistros()">Listar Registros</button>
    <table id="registros_table" class="table table-bordered table-striped table-hover">
        <thead>
            <tr>
                <th>Id Alarme</th>
                <th>Vigilante</th>
                <th>Descrição</th>
                <th>Horário de Registro</th>
                <th>Motivo de Acionamento</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Popper.js, necessário para o Bootstrap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Adicione o seu script JavaScript para manipular os registros -->
    <script src="js/registro.js"></script>
</body>

</html>
