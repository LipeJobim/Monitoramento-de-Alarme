<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Acionar Vigilante</title>
</head>

<body>
    <h1>Acionar Vigilante</h1>

    <button onclick="listarAlarmes()">Listar Alarmes Disponíveis</button>
    <ul id="alarmesDisponiveis" style="list-style-type:none;"></ul>

    <button onclick="listarVigilantes()">Listar Vigilantes Disponíveis</button>
    <ul id="vigilantesDisponiveis" style="list-style-type:none;"></ul>

    <label for="idVigilante">ID do Vigilante:</label>
    <input type="text" id="idVigilante" />

    <label for="idAlarme">ID do Alarme:</label>
    <input type="text" id="idAlarme" />

    <button onclick="acionar()">Acionar Vigilante</button>
    <p id="resultado"></p>
</body>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<!-- Popper.js, necessário para o Bootstrap -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function listarAlarmes() {
        // Lógica para listar alarmes
        fetch('http://localhost:8080/alarmes')
            .then(response => response.json())
            .then(alarmes => {
                const alarmesList = document.getElementById('alarmesDisponiveis');
                alarmesList.innerHTML = '';
                alarmes.forEach(alarme => {
                    const listItem = document.createElement('li');
                    listItem.textContent = `ID: ${alarme.id}, Status: ${alarme.status}`;
                    alarmesList.appendChild(listItem);
                });
            })
            .catch(error => console.error('Erro na solicitação:', error));
    }

    function listarVigilantes() {
        // Lógica para listar vigilantes
        fetch('http://localhost:8080/vigilantes')
            .then(response => response.json())
            .then(vigilantes => {
                const vigilantesList = document.getElementById('vigilantesDisponiveis');
                vigilantesList.innerHTML = '';
                vigilantes.forEach(vigilante => {
                    const listItem = document.createElement('li');
                    listItem.textContent = `ID: ${vigilante.idVigilante}, Nome: ${vigilante.nome}, Status: ${vigilante.status}`;
                    vigilantesList.appendChild(listItem);
                });
            })
            .catch(error => console.error('Erro na solicitação:', error));
    }

    function acionar() {
        const idVigilante = document.getElementById('idVigilante').value;
        const idAlarme = document.getElementById('idAlarme').value;

        const data = { idvigilante: idVigilante, idalarme: idAlarme };
        const json_data = JSON.stringify(data);

        fetch(`http://localhost:8080/vigilante/${idVigilante}/acionar/${idAlarme}`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
            },
            body: json_data,
        })
            .then(response => response.json())
            .then(result => {
                document.getElementById('resultado').textContent = `Vigilante com ID ${idVigilante} acionado com sucesso para o Alarme!`;
            })
            .catch(error => {
                document.getElementById('resultado').textContent = `Erro na solicitação: ${error}`;
            });
    }
</script>
</html>
