<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/clientes.css" rel="stylesheet">
</head>

<body>
    <h1>Lista de Clientes</h1>

    <p id="resultado_label"></p>

    <button class="btn btn-primary" onclick="listarClientes()">Listar Clientes</button>
    <button class="btn btn-success" onclick="atualizarCliente()">Atualizar Cliente</button>
    <button class="btn btn-danger" onclick="deletarCliente()">Deletar</button>
    <button class="btn btn-secondary" onclick="abrirJanelaCliente()">Criar cliente</button>

    <table id="clientes_table" class="table table-bordered table-striped table-hover">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Email</th>
                <th>Telefone</th>
                <th>Endereço</th>
                <th>CPF</th>
                <th>CEP</th>
                <th>Nascimento</th>
                <th>Data de Cadastro</th>
                
                <th class="cliente-id" style="display: none;">ID</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="modal fade" id="editarClienteModal" tabindex="-1" aria-labelledby="editarClienteModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editarClienteModalLabel">Editar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Adicione os campos de edição aqui -->
                    <div class="mb-3">
                        <label for="editNome" class="form-label">Nome:</label>
                        <input type="text" class="form-control" id="editNome" name="editNome">
                    </div>
                    <div class="mb-3">
                        <label for="editEmail" class="form-label">Email:</label>
                        <input type="email" class="form-control" id="editEmail" name="editEmail">
                    </div>
                    <div class="mb-3">
                        <label for="editTelefone" class="form-label">Telefone:</label>
                        <input type="tel" class="form-control" id="editTelefone" name="editTelefone">
                    </div>
                    <div class="mb-3">
                        <label for="editEndereco" class="form-label">Endereco:</label>
                        <input type="text" class="form-control" id="editEndereco" name="editEndereco" required>
                    </div>
                    <div class="mb-3">
                        <label for="editCpf" class="form-label">CPF:</label>
                        <input type="text" class="form-control" id="editCpf" name="editCpf" maxlength="11">
                    </div>
                    <div class="mb-3">
                        <label for="editCep" class="form-label">CEP:</label>
                        <input type="text" class="form-control" id="editCep" name="editCep">
                    </div>
                    <div class="mb-3">
                        <label for="editDatanascimento" class="form-label">Data de Nascimento:</label>
                        <input type="date" class="form-control" id="editDatanascimento" name="editDatanascimento">
                    </div>
                    <input type="hidden" id="editId" name="editId"> <!-- Campo oculto para armazenar o ID do cliente -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" onclick="fechar()">Fechar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarEdicaoCliente()">Salvar Alterações</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="criarClienteModal" tabindex="-1" aria-labelledby="criarClienteModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="criarClienteModalLabel">Criar Cliente</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Adicione os campos de criação aqui -->
                    <label for="createNome">Nome:</label>
                    <input type="text" id="createNome" name="createNome"><br>
                    <label for="createEmail">Email:</label>
                    <input type="email" id="createEmail" name="createEmail"><br>
                    <label for="createTelefone">Telefone: </label>
                    <input for="tel" id="createTelefone" name="createTelefone"><br>
                    <label for="createEndereco">Endereco: </label>
                    <input type="text" id="createEndereco" name="createEndereco" required><br>
                    <label for="createCpf">CPF</label>
                    <input type="number" id="createCpf" name="createCpf" maxlength="11"><br>
                    <label for="createCep"> Cep: </label>
                    <input type="number" id="createCep" name="createCep"><br>
                    <label for="createDatanascimento">Data de Nascimento:</label>
                    <input type="date" id="createDatanascimento" name="createDatanascimento"><br>

                    <input type="hidden" id="createid" name="createid">
                    <!-- Campo oculto para armazenar o ID do cliente -->
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarNovoCliente()">Salvar</button>
                </div>
            </div>
        </div>
    </div>
    <div>
        <button id="navegar" onclick="listarRegistros()">navegar</button>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Popper.js, necessário para o Bootstrap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/cliente.js"></script>
</body>

</html>
