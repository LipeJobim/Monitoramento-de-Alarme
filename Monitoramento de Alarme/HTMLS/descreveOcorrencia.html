<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descrever Ocorrências</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <h1>Descrever Ocorrências</h1>

    <label for="idAlarme">ID do Alarme:</label>
    <input type="text" id="idAlarme" />

    <label for="idVigilante">ID do Vigilante:</label>
    <input type="text" id="idVigilante" />

    <label for="motivoAcionamento">Motivo de Acionamento:</label>
    <input type="text" id="motivoAcionamento" />

    <p id="resultado"></p>

    <button onclick="salvarOcorrencia()">Salvar Ocorrência</button>
    <button class="btn btn-primary" onclick="listarAndamento()">Listar Registros</button>

    <table id="registros_table" class="table">
        <thead>
            <tr>
                <th>Id Alarme</th>
                <th>Vigilante</th>
                <th>Motivo de Acionamento</th>
                <th>Descrição</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Popper.js, necessário para o Bootstrap -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/2.10.2/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        function salvarOcorrencia() {
            const idAlarme = $('#idAlarme').val();
            const idVigilante = $('#idVigilante').val();
            const motivoAcionamento = $('#motivoAcionamento').val();
            const descricao = $('descricao')

            const data = {
                motivoAcionamento: motivoAcionamento,
                idAlarme: idAlarme,
                idVigilante: idVigilante,
                descricao : descricao
            };

            fetch(`http://localhost:8080/vigilante/${idVigilante}/terminar/${idAlarme}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            })
                .then(response => {
                    if (response.ok) {
                        const contentType = response.headers.get('content-type');
                        if (contentType && contentType.includes('application/json')) {
                            return response.json();
                        } else {
                            return response.text();
                        }
                    } else {
                        throw new Error('Erro na solicitação');
                    }
                })
                .then(result => {
                    if (typeof result === 'object') {
                        document.getElementById('resultado').textContent = result.message;
                    } else {
                        document.getElementById('resultado').textContent = result;
                    }
                })
                .catch(error => {
                    document.getElementById('resultado').textContent = `Erro na solicitação: ${error}`;
                });
        }

        function listarAndamento() {
            var resultado = document.getElementById("resultado");
        resultado.textContent = "";

            fetch('http://localhost:8080/listarAndamento')
                .then(response => response.json())
                .then(registros => preencherTabelaComDados(registros))
                .catch(error => {
                    resultadoLabel.textContent = "Erro ao listar registros.";
                });
        }

        function preencherTabelaComDados(registros) {
            const registrosBody = document.querySelector('#registros_table tbody');
            registrosBody.innerHTML = '';

            registros.forEach(registro => {
                const row = document.createElement('tr');
                row.innerHTML = `
            <td>${registro.id}</td>
            <td>${registro.idVigilante ? registro.idVigilante.nome : ''}</td>
            <td>${registro.idAlarme}</td>
            <td>${registro.motivoAcionamento}</td>
            <td>${registro.descricao}</td>
        `;
                registrosBody.appendChild(row);
            });
        }


    </script>
</body>

</html>
